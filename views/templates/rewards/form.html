{% extends "base.html" %}
{% block title %}New Reward{% endblock %}

{% block content %}
<div class="page-header">
    <div><h1>🎁 New Reward</h1></div>
    <a href="{{ url_for('main.reward_list') }}" class="btn btn-secondary">← Rewards</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="RewardName">Name</label>
            <input type="text" name="RewardName" id="RewardName" class="form-control" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="RewardTypeID">Type</label>
                <select name="RewardTypeID" id="RewardTypeID" class="form-control" required>
                    {% for rt in form_vm.reward_types %}
                    <option value="{{ rt['RewardTypeID'] }}">{{ rt['TypeName'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="Value">Amount (Gold or XP)</label>
                <input type="number" name="Value" id="Value" class="form-control" min="0">
            </div>
        </div>
        <div class="form-group">
            <label for="ItemID">Item (if Type is Item)</label>
            <select name="ItemID" id="ItemID" class="form-control">
                <option value="">None</option>
                {% for item in form_vm.items %}
                <option value="{{ item['ItemID'] }}">{{ item['ItemName'] }} ({{ item['RarityName'] }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Reward</button>
            <a href="{{ url_for('main.reward_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
